[package]
name = "vector-nodes"
# Inherited from workspace - start
version.workspace = true
license.workspace = true
authors.workspace = true
edition.workspace = true
publish.workspace = true
# Inherited from workspace - end

[features]
default = ["serde"]
serde = ["dep:serde", "core-types/serde", "vector-types/serde", "graphic-types/serde"]
wasm = ["core-types/wasm", "tsify", "wasm-bindgen"]

[dependencies]
# Local dependencies
core-types = { workspace = true }
graphene-hash = { workspace = true }
vector-types = { workspace = true }
graphic-types = { workspace = true }
node-macro = { workspace = true }
repeat-nodes = { workspace = true }

# Workspace dependencies
dyn-any = { workspace = true }
glam = { workspace = true }
kurbo = { workspace = true }
rand = { workspace = true }
rustc-hash = { workspace = true }
log = { workspace = true }
qrcodegen = { workspace = true }

# Optional workspace dependencies
serde = { workspace = true, optional = true }
tsify = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }

[dev-dependencies]
graphene-core = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt"] }
futures = { workspace = true }
