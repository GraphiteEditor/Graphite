[package]
name = "raster-types"
description = "Raster data types for Graphene node system"
# Inherited from workspace - start
version.workspace = true
license.workspace = true
authors.workspace = true
edition.workspace = true
publish.workspace = true
# Inherited from workspace - end

[features]
default = ["serde"]
serde = ["dep:serde", "core-types/serde"]
wgpu = ["dep:wgpu"]
wasm = ["core-types/wasm", "tsify", "wasm-bindgen"]

[dependencies]
# Local dependencies
core-types = { workspace = true }
graphene-hash = { workspace = true }
node-macro = { workspace = true }

# Workspace dependencies
dyn-any = { workspace = true }
glam = { workspace = true }
base64 = { workspace = true }
bytemuck = { workspace = true }
image = { workspace = true }
serde_json = { workspace = true }

# Optional workspace dependencies
serde = { workspace = true, optional = true }
tsify = { workspace = true, optional = true }
wgpu = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }
