name: "CI"

on:
  pull_request: {}
  merge_group: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust format check on GitHub runner
  rust-fmt:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clone repository
        uses: actions/checkout@v4

      - name: 🚦 Check if CI can be skipped
        id: skip-check
        uses: cariad-tech/merge-queue-ci-skipper@main

      - name: 🦀 Install Rust
        if: steps.skip-check.outputs.skip-check != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          rustflags: ""
          components: rustfmt

      - name: 🔬 Check Rust formatting
        if: steps.skip-check.outputs.skip-check != 'true'
        run: cargo fmt --all -- --check

  # License compatibility check on GitHub runner
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Clone repository
        uses: actions/checkout@v4

      - name: 📜 Check crate license compatibility for root workspace
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources

      - name: 📜 Check crate license compatibility for /libraries/rawkit
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
          manifest-path: libraries/rawkit/Cargo.toml

  # Build the web app on the self-hosted wasm runner
  build:
    runs-on: [self-hosted, target/wasm]
    permissions:
      contents: write
      deployments: write
      pull-requests: write
      actions: write
    env:
      RUSTC_WRAPPER: /usr/bin/sccache
      CARGO_INCREMENTAL: 0
      SCCACHE_DIR: /var/lib/github-actions/.cache

    steps:
      - name: 📥 Clone repository
        uses: actions/checkout@v4

      - name: 🚦 Check if CI can be skipped
        id: skip-check
        uses: cariad-tech/merge-queue-ci-skipper@main

      - name: 🗑 Clear wasm-bindgen cache
        if: steps.skip-check.outputs.skip-check != 'true'
        run: rm -r ~/.cache/.wasm-pack || true

      - name: 🟢 Install Node.js
        if: steps.skip-check.outputs.skip-check != 'true'
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: 🚧 Install build dependencies
        if: steps.skip-check.outputs.skip-check != 'true'
        run: |
          cd frontend
          npm run setup

      - name: 🦀 Install Rust
        if: steps.skip-check.outputs.skip-check != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          rustflags: ""
          target: wasm32-unknown-unknown

      - name: 🦀 Fetch Rust dependencies
        if: steps.skip-check.outputs.skip-check != 'true'
        run: |
          cargo fetch --locked

      - name: 🌐 Build Graphite web code
        if: steps.skip-check.outputs.skip-check != 'true'
        env:
          NODE_ENV: production
        run: mold -run cargo run build web

      - name: 📤 Publish to Cloudflare Pages
        if: steps.skip-check.outputs.skip-check != 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@3 pages deploy "frontend/dist" --project-name="graphite-dev" --commit-dirty=true

      - name: 👕 Lint Graphite web formatting
        if: steps.skip-check.outputs.skip-check != 'true'
        env:
          NODE_ENV: production
        run: |
          cd frontend
          npm run check

  # Run the Rust tests on the self-hosted native runner
  test:
    runs-on: [self-hosted, target/native]
    env:
      RUSTC_WRAPPER: /usr/bin/sccache
      CARGO_INCREMENTAL: 0
      SCCACHE_DIR: /var/lib/github-actions/.cache

    steps:
      - name: 📥 Clone repository
        uses: actions/checkout@v4

      - name: 🚦 Check if CI can be skipped
        id: skip-check
        uses: cariad-tech/merge-queue-ci-skipper@main

      - name: 🦀 Install Rust
        if: steps.skip-check.outputs.skip-check != 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          rustflags: ""

      - name: 🦀 Fetch Rust dependencies
        if: steps.skip-check.outputs.skip-check != 'true'
        run: |
          cargo fetch --locked

      - name: 🧪 Run Rust tests
        if: steps.skip-check.outputs.skip-check != 'true'
        env:
          RUSTFLAGS: -Dwarnings
        run: |
          mold -run cargo test --all-features
